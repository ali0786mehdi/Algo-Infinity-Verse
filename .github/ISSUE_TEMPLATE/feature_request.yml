name: Feature Request
description: Suggest a new feature or idea
title: '[Feature]: '
labels: feature-request, ssoc26
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem description
      description: A clear description of the problem you're trying to solve.
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How you envision the feature working.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any alternative solutions or features you've considered.
    validations:
      required: false
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add any other context or screenshots about the feature request.
    validations:
      required: false
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OCaml Editor – Live Code Editor | Algo Infinity Verse</title>
    <meta name="description" content="Write, compile, and run OCaml code in your browser with syntax highlighting, functional programming templates, and real-time output." />
    <link rel="stylesheet" href="/styles.css" />
    <link rel="stylesheet" href="ocaml-editor.css" />
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Poppins:wght@300;400;500;600;700&family=Fira+Code:wght@400;500;600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

    <!-- Theme Initialization Script -->
    <script>
      (function() {
        try {
          var storedTheme = localStorage.getItem('theme');
          var prefersLight = window.matchMedia('(prefers-color-scheme: light)').matches;
          var theme = storedTheme || (prefersLight ? 'light' : 'dark');
          if (theme === 'light') {
            document.documentElement.classList.add('light-mode');
          } else {
            document.documentElement.classList.remove('light-mode');
          }
        } catch (e) {}
      })();
    </script>
</head>
  <body data-page="ocaml-editor" data-no-loading>
    <div id="loading-screen" class="hidden">
      <div class="loader">
        <div class="infinity-loader">∞</div>
        <h2>Algo Infinity Verse</h2>
        <div class="loading-bar"><div class="loading-progress"></div></div>
      </div>
    </div>

    <button type="button" id="scrollTopBtn" class="scroll-top-btn" aria-label="Scroll to top">
      <i class="fas fa-arrow-up"></i>
    </button>

    <div id="navbar-placeholder"></div>

    <section class="hero ml-hero">
      <div class="hero-background">
        <div class="stars"></div><div class="stars2"></div><div class="stars3"></div>
      </div>
      <div class="hero-content">
        <h1 class="hero-title">
          <span class="title-line">Write OCaml.</span>
          <span class="main-title" style="background: linear-gradient(135deg, #ec6813 0%, #f0a050 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">Run It Instantly.</span>
          <span class="subtitle">In-Browser OCaml Editor</span>
        </h1>
      </div>
    </section>

    <main class="editor-container">
      <div class="editor-wrapper">
        <div class="editor-header">
          <div class="editor-info">
            <i class="fas fa-cube" style="color: #ec6813;"></i>
            <span id="mlActiveFileName">main.ml</span>
            <span id="mlStatusBadge" class="ml-status-badge ml-status-ready">Ready</span>
          </div>
          <div class="editor-actions">
            <select id="mlExampleSelect" class="ml-select" aria-label="Load example">
              <option value="hello">Hello World</option>
              <option value="variables">Variables & Functions</option>
              <option value="recursion">Recursion & Lists</option>
              <option value="pattern">Pattern Matching</option>
              <option value="modules">Modules & Functors</option>
              <option value="higherorder">Higher-Order Functions</option>
            </select>
            <button type="button" id="mlCopyBtn" class="ml-icon-btn" title="Copy Code" aria-label="Copy Code"><i class="fas fa-copy"></i></button>
            <button type="button" id="mlSaveBtn" class="ml-icon-btn" title="Save Project" aria-label="Save Project"><i class="fas fa-save"></i></button>
            <button type="button" id="mlResetBtn" class="ml-icon-btn ml-reset-btn" title="Reset Editor" aria-label="Reset Editor"><i class="fas fa-undo"></i></button>
            <button type="button" id="mlRunBtn" class="ml-run-btn"><i class="fas fa-play"></i> Run Code</button>
          </div>
        </div>

        <div class="editor-main">
          <!-- File Explorer Sidebar -->
          <aside class="file-explorer">
            <div class="explorer-header">
              <span><i class="fas fa-folder-open"></i> FILES</span>
              <button type="button" id="mlNewFileBtn" class="explorer-action-btn" title="New File" aria-label="New File">
                <i class="fas fa-file-circle-plus"></i>
              </button>
            </div>
            <div id="mlFileList" class="file-list">
              <!-- Dynamically populated -->
            </div>
          </aside>

          <!-- Code Editor Workspace -->
          <div class="code-editor-workspace">
            <div class="code-editor">
              <div class="line-numbers" id="mlLineNumbers">1</div>
              <textarea id="mlEditor" class="code-textarea" spellcheck="false" autocomplete="off" autocorrect="off" autocapitalize="off" aria-label="OCaml code editor" placeholder="(* Write your OCaml code here... *)"></textarea>
              <div class="syntax-highlight" id="mlHighlight"></div>
            </div>
            <div class="editor-shortcuts">
              <span><kbd>Ctrl</kbd>+<kbd>Enter</kbd> Run Code</span>
              <span><kbd>Ctrl</kbd>+<kbd>S</kbd> Save Project</span>
              <span><kbd>Tab</kbd> Indent (2 Spaces)</span>
            </div>
          </div>
        </div>
      </div>

      <div class="panels-container">
        <div class="panel output-panel">
          <div class="panel-header">
            <i class="fas fa-terminal" style="color: #ec6813;"></i>
            <span>Standard Output</span>
          </div>
          <div id="mlOutputBody" class="panel-body">
            <span class="ml-output-placeholder">Output will appear here after running...</span>
          </div>
        </div>

        <div class="panel console-panel">
          <div class="panel-header">
            <i class="fas fa-exclamation-triangle" style="color: #ea580c;"></i>
            <span>OCaml Compiler / Type Errors</span>
            <button type="button" id="mlConsoleClear" class="console-clear-btn" title="Clear Console" aria-label="Clear Console"><i class="fas fa-trash-alt"></i></button>
          </div>
          <div id="mlConsoleBody" class="panel-body">
            <span class="ml-console-placeholder">No compilation errors.</span>
          </div>
        </div>
      </div>
    </main>

    <div id="footer-placeholder"></div>

    <script src="ocaml-editor.js"></script>
    <script src="/auth.js"></script>
    <script src="/bootstrap-legacy.js"></script>

    <script src="/script.js"></script>
    <script type="module" src="/dist/legacy-bundle.mjs"></script>
    <script src="/theme.js"></script>
    <script>
      loadPartial('navbar-placeholder', '/partials/navbar.html');
      loadPartial('footer-placeholder', '/partials/footer.html');
    </script>
  </body>
</html>
